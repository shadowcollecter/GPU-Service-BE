apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "gpu-service-be.fullname" . }}-binding
subjects:
  - kind: ServiceAccount
    name: {{ include "gpu-service-be.fullname" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "gpu-service-be.fullname" . }}-role
  apiGroup: rbac.authorization.k8s.io