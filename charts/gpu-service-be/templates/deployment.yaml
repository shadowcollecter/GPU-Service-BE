apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gpu-service-be.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "gpu-service-be.fullname" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "gpu-service-be.fullname" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "gpu-service-be.fullname" . }}
    spec:
      serviceAccountName: {{ include "gpu-service-be.fullname" . }}
      containers:
        - name: gpu-service-be
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
              name: http
          # 添加健康檢查
          livenessProbe:
            httpGet:
              path: {{ .Values.healthCheck.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.healthCheck.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthCheck.liveness.periodSeconds }}
            failureThreshold: {{ .Values.healthCheck.liveness.failureThreshold }}
            timeoutSeconds: {{ .Values.healthCheck.liveness.timeoutSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.healthCheck.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.healthCheck.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthCheck.readiness.periodSeconds }}
            failureThreshold: {{ .Values.healthCheck.readiness.failureThreshold }}
            timeoutSeconds: {{ .Values.healthCheck.readiness.timeoutSeconds }}
          env:
            - name: MINIO_URL
              value: "http://{{ .Values.config.minioService }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.config.minioPort }}"
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "gpu-service-be.fullname" . }}-secrets
                  key: minio-access-key
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "gpu-service-be.fullname" . }}-secrets
                  key: minio-secret-key
            - name: MINIO_BUCKET_NAME
              value: "{{ .Values.config.minioBucket }}"
            - name: CALLBACK_BASE_URL
              value: "{{ .Values.config.callbackBaseUrl }}"
            - name: SPRING_PROFILES_ACTIVE
              value: "{{ .Values.application.activeProfile }}"
            - name: SPRING_DATASOURCE_URL
              value: "{{ (index .Values.applicationProperties .Values.application.activeProfile).spring.datasource.url }}"
            - name: SPRING_DATASOURCE_USERNAME
              value: "{{ (index .Values.applicationProperties .Values.application.activeProfile).spring.datasource.username }}"
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "gpu-service-be.fullname" . }}-secrets
                  key: db-password
            - name: SPRING_DATASOURCE_DRIVER_CLASS_NAME
              value: "{{ (index .Values.applicationProperties .Values.application.activeProfile).spring.datasource.driverClassName }}"
            - name: SPRING_DATA_REDIS_HOST
              value: "{{ (index .Values.applicationProperties .Values.application.activeProfile).spring.data.redis.host }}"
            - name: SPRING_DATA_REDIS_PORT
              value: "{{ (index .Values.applicationProperties .Values.application.activeProfile).spring.data.redis.port }}"
            - name: SPRING_DATA_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "gpu-service-be.fullname" . }}-secrets
                  key: redis-password
            # 添加 JWT 配置
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "gpu-service-be.fullname" . }}-secrets
                  key: jwt-secret
            - name: JWT_ISSUER
              value: "{{ (index .Values.applicationProperties .Values.application.activeProfile).security.jwt.issuer }}"
            - name: JWT_AUDIENCE
              value: "{{ (index .Values.applicationProperties .Values.application.activeProfile).security.jwt.audience }}"
            # 添加 SAML2 配置
            - name: SPRING_SECURITY_SAML2_RELYINGPARTY_REGISTRATION_NCU_ENTITY_ID
              value: "{{ (index .Values.applicationProperties .Values.application.activeProfile).security.saml2.entityId }}"
            - name: SPRING_SECURITY_SAML2_RELYINGPARTY_REGISTRATION_NCU_ACS_LOCATION
              value: "{{ (index .Values.applicationProperties .Values.application.activeProfile).security.saml2.acsLocation }}"
            - name: SPRING_SECURITY_SAML2_RELYINGPARTY_REGISTRATION_NCU_ACS_BINDING
              value: "POST"
            - name: SPRING_SECURITY_SAML2_RELYINGPARTY_REGISTRATION_NCU_ASSERTINGPARTY_METADATA_URI
              value: "{{ .Values.security.saml2.assertingParty.metadataUri }}"
            - name: SPRING_SECURITY_SAML2_RELYINGPARTY_REGISTRATION_NCU_ASSERTINGPARTY_ENTITY_ID
              value: "{{ .Values.security.saml2.assertingParty.entityId }}"
            - name: SPRING_SECURITY_SAML2_RELYINGPARTY_REGISTRATION_NCU_ASSERTINGPARTY_SINGLESIGNON_URL
              value: "{{ .Values.security.saml2.assertingParty.singleSignOnUrl }}"
            - name: SPRING_SECURITY_SAML2_RELYINGPARTY_REGISTRATION_NCU_ASSERTINGPARTY_SINGLESIGNON_BINDING
              value: "{{ .Values.security.saml2.assertingParty.singleSignOnBinding }}"
            # 添加前端 URL 配置
            - name: APP_FRONTEND_URL
              value: "{{ (index .Values.applicationProperties .Values.application.activeProfile).app.frontendUrl }}"
          resources: {{ toYaml .Values.resources | indent 12 }}
      nodeSelector: {{ toYaml .Values.nodeSelector | indent 6 }}
      tolerations: {{ toYaml .Values.tolerations | indent 6 }}
      affinity: {{ toYaml .Values.affinity | indent 6 }}