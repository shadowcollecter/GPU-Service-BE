apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gpu-service-be.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "gpu-service-be.fullname" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "gpu-service-be.fullname" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "gpu-service-be.fullname" . }}
    spec:
      serviceAccountName: {{ include "gpu-service-be.fullname" . }}
      containers:
        - name: gpu-service-be
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
              name: http
          env:
            - name: MINIO_URL
              value: "{{ .Values.config.minioEndpoint }}"
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: accesskey
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: secretkey
            - name: MINIO_BUCKET_NAME
              value: "{{ .Values.config.minioBucket }}"
            - name: CALLBACK_BASE_URL
              value: "{{ .Values.config.callbackBaseUrl }}"
            - name: SPRING_PROFILES_ACTIVE
              value: "{{ .Values.application.activeProfile }}"
            - name: SPRING_DATASOURCE_URL
              value: "{{ (index .Values.applicationProperties .Values.application.activeProfile).spring.datasource.url }}"
            - name: SPRING_DATASOURCE_USERNAME
              value: "{{ (index .Values.applicationProperties .Values.application.activeProfile).spring.datasource.username }}"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "{{ (index .Values.applicationProperties .Values.application.activeProfile).spring.datasource.password }}"
            - name: SPRING_DATASOURCE_DRIVER_CLASS_NAME
              value: "{{ (index .Values.applicationProperties .Values.application.activeProfile).spring.datasource.driverClassName }}"
            - name: SPRING_DATA_REDIS_HOST
              value: "{{ (index .Values.applicationProperties .Values.application.activeProfile).spring.data.redis.host }}"
            - name: SPRING_DATA_REDIS_PORT
              value: "{{ (index .Values.applicationProperties .Values.application.activeProfile).spring.data.redis.port }}"
            - name: SPRING_DATA_REDIS_PASSWORD
              value: "{{ (index .Values.applicationProperties .Values.application.activeProfile).spring.data.redis.password }}"
          resources: {{ toYaml .Values.resources | indent 12 }}
      nodeSelector: {{ toYaml .Values.nodeSelector | indent 6 }}
      tolerations: {{ toYaml .Values.tolerations | indent 6 }}
      affinity: {{ toYaml .Values.affinity | indent 6 }}