{{- if .Values.frontend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gpu-service-be.fullname" . }}-fe
  labels:
    app.kubernetes.io/name: {{ include "gpu-service-be.fullname" . }}-fe
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "gpu-service-be.fullname" . }}-fe
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "gpu-service-be.fullname" . }}-fe
    spec:
      containers:
        - name: gpu-service-fe
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.frontend.service.port }}
              name: http
          # 為前端服務添加健康檢查
          livenessProbe:
            httpGet:
              path: {{ .Values.frontend.healthCheck.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.frontend.healthCheck.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.frontend.healthCheck.liveness.periodSeconds }}
            failureThreshold: {{ .Values.frontend.healthCheck.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.frontend.healthCheck.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.frontend.healthCheck.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.frontend.healthCheck.readiness.periodSeconds }}
            failureThreshold: {{ .Values.frontend.healthCheck.readiness.failureThreshold }}
          # 設定環境變數以連接後端
          env:
            - name: API_URL
              value: "http://{{ include "gpu-service-be.fullname" . }}:{{ .Values.service.port }}"
          # 添加資源限制
          resources: 
            {{- toYaml .Values.frontend.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "gpu-service-be.fullname" . }}-fe
  labels:
    app.kubernetes.io/name: {{ include "gpu-service-be.fullname" . }}-fe
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: {{ include "gpu-service-be.fullname" . }}-fe
{{- end }}