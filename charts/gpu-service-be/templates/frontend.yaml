{{- if .Values.frontend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gpu-service-be.fullname" . }}-fe
  labels:
    app.kubernetes.io/name: {{ include "gpu-service-be.fullname" . }}-fe
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "gpu-service-be.fullname" . }}-fe
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "gpu-service-be.fullname" . }}-fe
    spec:
      containers:
        - name: gpu-service-fe
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.frontend.service.port }}
              name: http
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "gpu-service-be.fullname" . }}-fe
  labels:
    app.kubernetes.io/name: {{ include "gpu-service-be.fullname" . }}-fe
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: {{ include "gpu-service-be.fullname" . }}-fe
{{- end }}