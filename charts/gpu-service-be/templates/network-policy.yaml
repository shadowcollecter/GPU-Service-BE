{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "gpu-service-be.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "gpu-service-be.fullname" . }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "gpu-service-be.fullname" . }}
  policyTypes:
    - Ingress
  {{- with .Values.networkPolicy.ingressRules }}
  ingress:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
# 前端服務網絡策略
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "gpu-service-be.fullname" . }}-fe
  labels:
    app.kubernetes.io/name: {{ include "gpu-service-be.fullname" . }}-fe
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "gpu-service-be.fullname" . }}-fe
  policyTypes:
    - Ingress
  ingress:
    # 允許 Ingress 訪問
    - from:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: {{ .Values.frontend.service.port }}
{{- end }}