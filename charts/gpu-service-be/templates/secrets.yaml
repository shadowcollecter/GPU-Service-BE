apiVersion: v1
kind: Secret
metadata:
  name: {{ include "gpu-service-be.fullname" . }}-secrets
  labels:
    app.kubernetes.io/name: {{ include "gpu-service-be.fullname" . }}
type: Opaque
data:
  # MinIO 認證
  minio-access-key: {{ .Values.secret.minio.accessKey | b64enc | quote }}
  minio-secret-key: {{ .Values.secret.minio.secretKey | b64enc | quote }}
  
  # 資料庫密碼
  db-password: {{ .Values.secret.db.password | b64enc | quote }}
  
  # Redis 密碼
  redis-password: {{ .Values.secret.redis.password | b64enc | quote }}
  
  # JWT 密鑰
  jwt-secret: {{ .Values.secret.jwt.secretKey | b64enc | quote }}