replicaCount: 1

image:
  repository: csie/ncu/gpu-service-be
  tag: "0.0.1-SNAPSHOT"
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: "gpu-service-be-sa"

# MinIO and callback configuration
config:
  callbackBaseUrl: "http://gpu-service-be.gpu-service.svc.cluster.local:8080/api/v1/task/status"
  minioService: "minio"
  minioPort: 9000
  minioBucket: "notebooks"

# Security configuration
security:
  jwt:
    secret: "ZmFrZXRva2tlbmZha2V0b2tlbmZha2tfa2V5X3N0cmluZw=="
    issuer: "gpu-service-be"
    audience: "https://jupyterhub.csie.ncu.edu.tw"
  saml2:
    entityId: "https://jupyterhub.csie.ncu.edu.tw/saml2/service-provider-metadata/ncu"
    acsLocation: "https://jupyterhub.csie.ncu.edu.tw/login/saml2/sso/ncu"
    acsBinding: "POST"
    assertingParty:
      metadataUri: "https://portal.ncu.edu.tw/saml/metadata"
      entityId: "https://portal.ncu.edu.tw/saml/idp"
      singleSignOnUrl: "https://portal.ncu.edu.tw/saml/sso"
      singleSignOnBinding: "REDIRECT"

# Health check configuration
healthCheck:
  liveness:
    initialDelaySeconds: 60
    periodSeconds: 30
    failureThreshold: 3
    timeoutSeconds: 5
    path: "/actuator/health/liveness"
  readiness:
    initialDelaySeconds: 30
    periodSeconds: 20
    failureThreshold: 3
    timeoutSeconds: 3
    path: "/actuator/health/readiness"

# MinIO credentials
secret:
  minio:
    accessKey: "admin"
    secretKey: "mhAH74T0Wo"
  jwt:
    secretKey: "ZmFrZXRva2tlbmZha2V0b2tlbmZha2tfa2V5X3N0cmluZw=="
  db:
    password: "czCqSinzp0"
  redis:
    password: "FNsfJW3B1n"

# GPU config for mapping types, templates and queues
gpu:
  cpu:
    yaml: cpu-requested-job.yaml
    queue: cpu-queue
  types:
    - type: NVIDIA-A100-80GB-PCIe
      yaml: gpu-requested-job-a100.yaml
      queue: gpu-queue-a100
    - type: NVIDIA-A40-48GB-PCIe
      yaml: gpu-requested-job-a40.yaml
      queue: gpu-queue-a40

# Unified queue configuration
queue:
  names:
    - cpu-queue
    - gpu-queue-a100
    - gpu-queue-a40
  redisKeys:
    cpu-queue: "task_queue_cpu"
    gpu-queue-a100: "task_queue_a100"
    gpu-queue-a40: "task_queue_a40"

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: "4000m"
    memory: "3Gi"
  limits:
    cpu: "4000m"
    memory: "3Gi"

tolerations: []

affinity: {}

nodeSelector: {}

frontend:
  enabled: true
  image:
    repository: shadowcollect/gpu-service-fe
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
  resources:
    requests:
      cpu: "200m"
      memory: "512Mi"
    limits:
      cpu: "400m"
      memory: "1Gi"
  healthCheck:
    liveness:
      initialDelaySeconds: 30
      periodSeconds: 20
      failureThreshold: 3
      path: "/"
    readiness:
      initialDelaySeconds: 15
      periodSeconds: 10
      failureThreshold: 3
      path: "/"

ingress:
  enabled: true
  className: "nginx"
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: jupyterhub.csie.ncu.edu.tw
      paths:
        - path: /
          pathType: Prefix
          serviceName: gpu-service-be
          servicePort: 8080
        - path: /frontend
          pathType: Prefix
          serviceName: gpu-service-be-fe
          servicePort: 80
  tls:
    - secretName: jupyterhub-csie-ncu-tls
      hosts:
        - jupyterhub.csie.ncu.edu.tw

networkPolicy:
  enabled: true
  ingressRules:
    - from:
        - podSelector:
            matchLabels:
              app: frontend
      ports:
        - protocol: TCP
          port: 8080
    - from:
        - namespaceSelector:
            matchLabels:
              name: kube-system
      ports:
        - protocol: TCP
          port: 8080

application:
  activeProfile: dev

applicationProperties:
  dev:
    spring:
      datasource:
        url: "jdbc:postgresql://postgresql.gpu-service.svc.cluster.local:5432/gpu_service_be"
        username: "postgres"
        password: "${secret.db.password}"
        driverClassName: "org.postgresql.Driver"
      data:
        redis:
          host: "redis-master.gpu-service.svc.cluster.local"
          port: 6379
          password: "${secret.redis.password}"
    minio:
      url: "http://minio.gpu-service.svc.cluster.local:9000"
      accessKey: "${secret.minio.accessKey}"
      secretKey: "${secret.minio.secretKey}"
      bucketName: "notebooks"
    app:
      frontendUrl: "https://jupyterhub.csie.ncu.edu.tw"
    security:
      jwt:
        secret: "${secret.jwt.secretKey}"
        issuer: "gpu-service-be"
        audience: "https://jupyterhub.csie.ncu.edu.tw"
      saml2:
        entityId: "https://jupyterhub.csie.ncu.edu.tw/saml2/service-provider-metadata/ncu"
        acsLocation: "https://jupyterhub.csie.ncu.edu.tw/login/saml2/sso/ncu"
  prod:
    spring:
      datasource:
        url: "jdbc:postgresql://postgresql.gpu-service.svc.cluster.local:5432/gpu_service_be"
        username: "postgres"
        password: "${secret.db.password}"
        driverClassName: "org.postgresql.Driver"
      data:
        redis:
          host: "redis-master.gpu-service.svc.cluster.local"
          port: 6379
          password: "${secret.redis.password}"
    minio:
      url: "http://minio.gpu-service.svc.cluster.local:9000"
      accessKey: "${secret.minio.accessKey}"
      secretKey: "${secret.minio.secretKey}"
      bucketName: "notebooks"
    app:
      frontendUrl: "https://jupyterhub.csie.ncu.edu.tw"
    security:
      jwt:
        secret: "${secret.jwt.secretKey}"
        issuer: "gpu-service-be"
        audience: "https://jupyterhub.csie.ncu.edu.tw"
      saml2:
        entityId: "https://jupyterhub.csie.ncu.edu.tw/saml2/service-provider-metadata/ncu"
        acsLocation: "https://jupyterhub.csie.ncu.edu.tw/login/saml2/sso/ncu"

minio:
  enabled: true
  auth:
    rootUser: "admin"
    rootPassword: "mhAH74T0Wo"
  persistence:
    size: 100Gi

postgresql:
  enabled: true
  postgresqlUsername: "postgres"
  postgresqlPassword: "czCqSinzp0"
  postgresqlDatabase: "gpu_service_be"
  persistence:
    size: 100Gi

redis:
  enabled: true
  architecture: replication
  auth:
    password: "czCqSinzp0"

kaiScheduler:
  enabled: true
  global:
    gpuSharing: false
    cdiEnabled: true
  scheduler:
    additionalArgs:
      - "--cdi-enabled=true"
  binder:
    additionalArgs:
      - "--cdi-enabled=true"

# helm upgrade --install gpu-service-be charts/gpu-service-be -n gpu-service --set application.activeProfile=prod