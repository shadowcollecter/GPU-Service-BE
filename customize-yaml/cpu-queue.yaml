apiVersion: scheduling.run.ai/v2
kind: Queue
metadata:
  name: cpu-queue
spec:
  priority: 100
  resources:
    cpu:
      quota: 10000        # millicpu (10 CPUs)
      overQuotaWeight: 1
    gpu:
      quota: 0
      overQuotaWeight: 0
    memory:
      quota: -1           # no explicit limit
      overQuotaWeight: 1