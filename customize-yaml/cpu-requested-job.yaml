apiVersion: batch/v1
kind: Job
metadata:
  name: notebook-cpu-job
  namespace: gpu-service
  annotations:
    gpu-service-be.csie.ncu.edu.tw/submission-id: "${SUBMISSION_ID}"
    gpu-service-be.csie.ncu.edu.tw/user-id:       "${USER_ID}"
    gpu-service-be.csie.ncu.edu.tw/timestamp:     "${TIMESTAMP}"
    gpu-service-be.csie.ncu.edu.tw/presign-url:   "${PRESIGN_URL}"
    gpu-service-be.csie.ncu.edu.tw/gpu-type:      "CPU"
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 300    # auto delete Job/Pods 5min after finish (success or failure)
  activeDeadlineSeconds: 3600     # limit job run to max 1 hour
  template:
    metadata:
      labels:
        runai/queue: cpu-queue
        app: notebook-runner
        resource-type: cpu
      annotations:
        gpu-service-be.csie.ncu.edu.tw/submission-id: "${SUBMISSION_ID}"
        gpu-service-be.csie.ncu.edu.tw/user-id:       "${USER_ID}"
        gpu-service-be.csie.ncu.edu.tw/timestamp:     "${TIMESTAMP}"
        gpu-service-be.csie.ncu.edu.tw/presign-url:   "${PRESIGN_URL}"
        gpu-service-be.csie.ncu.edu.tw/gpu-type:      "CPU"
    spec:
      restartPolicy: Never
      serviceAccountName: gpu-service-be-account
      containers:
      - name: runner
        image: shadowcollect/ipynb-runner:latest
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "1"
            memory: "2Gi"
        env:
        - name: PRESIGNED_URL
          valueFrom:
            fieldRef:
              fieldPath: metadata.annotations['gpu-service-be.csie.ncu.edu.tw/presign-url']
        - name: CALLBACK_BASE_URL
          value: "http://gpu-service-be:8080/api/v1/task/status"
        - name: SUBMISSION_ID
          valueFrom:
            fieldRef:
              fieldPath: metadata.annotations['gpu-service-be.csie.ncu.edu.tw/submission-id']
        - name: MINIO_ENDPOINT
          value: "http://minio.gpu-service.svc.cluster.local:9000"
        - name: MINIO_BUCKET
          value: "notebooks"
        - name: AWS_ACCESS_KEY_ID
          value: "admin"
        - name: AWS_SECRET_ACCESS_KEY
          value: "mhAH74T0Wo"
        - name: USER_ID
          valueFrom:
            fieldRef:
              fieldPath: metadata.annotations['gpu-service-be.csie.ncu.edu.tw/user-id']
        - name: TIMESTAMP
          valueFrom:
            fieldRef:
              fieldPath: metadata.annotations['gpu-service-be.csie.ncu.edu.tw/timestamp']
        - name: GPU_TYPE
          value: "CPU"
        command:
        - /bin/bash
        - -c
        - |
          set -euo pipefail
          exec > >(tee /tmp/job.log) 2>&1
          trap '
            rc=$?; \
            if [ $rc -ne 0 ]; then \
              echo "Notifying backend of job failure..."; \
              error_msg=$(sed -e ":a" -e "N;\$!ba" -e "s/\"/\\\\\"/g" -e "s/\n/\\\\n/g" /tmp/job.log); \
              echo "Error message: $error_msg"; \
              curl -X POST "$CALLBACK_BASE_URL/$SUBMISSION_ID" \
                   --max-time 10 \
                   -v \
                   -H "Content-Type: application/json" \
                   -d "{\"submissionId\":\"$SUBMISSION_ID\",\"status\":\"FAILED\",\"errorMessage\":\"$error_msg\"}"; \
              echo "Callback curl exit code: $?"; \
              # 嘗試備用IP直接訪問
              echo "Trying direct IP callback..."; \
              curl -X POST "http://10.233.36.85:8080/api/v1/task/status/$SUBMISSION_ID" \
                   --max-time 10 \
                   -v \
                   -H "Content-Type: application/json" \
                   -d "{\"submissionId\":\"$SUBMISSION_ID\",\"status\":\"FAILED\",\"errorMessage\":\"Secondary callback: $error_msg\"}"; \
              echo "Secondary callback curl exit code: $?"; \
            fi; \
            exit $rc
          ' EXIT
          echo "Starting job execution at $(date)"
          echo "Downloading input notebook..."
          curl -fSL "$PRESIGNED_URL" -o input.ipynb
          
          echo "Running papermill to execute notebook..."
          papermill input.ipynb output.ipynb \
            --no-progress-bar --log-output
          
          echo "Uploading execution results to MinIO..."
          aws --endpoint-url=$MINIO_ENDPOINT s3 cp output.ipynb \
            s3://$MINIO_BUCKET/submissions/$USER_ID/${TIMESTAMP}_results/result_notebook.ipynb
          
          echo "Notifying backend of job completion..."
          curl -X POST "$CALLBACK_BASE_URL/$SUBMISSION_ID" \
               -H "Content-Type: application/json" \
               -d '{"submissionId":"'"$SUBMISSION_ID"'","status":"COMPLETED","resultPath":"s3://'$MINIO_BUCKET'/submissions/'"$USER_ID"'/'"${TIMESTAMP}"'_results/result_notebook.ipynb"}'
          
          echo "Job completed successfully at $(date)"