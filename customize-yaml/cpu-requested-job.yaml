apiVersion: batch/v1
kind: Job
metadata:
  name: notebook-cpu-job
  namespace: gpu-service
  annotations:
    gpu-service-be.csie.ncu.edu.tw/submission-id: "${SUBMISSION_ID}"
    gpu-service-be.csie.ncu.edu.tw/user-id:       "${USER_ID}"
    gpu-service-be.csie.ncu.edu.tw/timestamp:     "${TIMESTAMP}"
    gpu-service-be.csie.ncu.edu.tw/presign-url:   "${PRESIGN_URL}"
    gpu-service-be.csie.ncu.edu.tw/gpu-type:      "CPU"
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 300    # auto delete Job/Pods 5min after finish (success or failure)
  activeDeadlineSeconds: 3600     # limit job run to max 1 hour
  template:
    metadata:
      labels:
        runai/queue: cpu-queue
        app: notebook-runner
        resource-type: cpu
      annotations:
        gpu-service-be.csie.ncu.edu.tw/submission-id: "${SUBMISSION_ID}"
        gpu-service-be.csie.ncu.edu.tw/user-id:       "${USER_ID}"
        gpu-service-be.csie.ncu.edu.tw/timestamp:     "${TIMESTAMP}"
        gpu-service-be.csie.ncu.edu.tw/presign-url:   "${PRESIGN_URL}"
        gpu-service-be.csie.ncu.edu.tw/gpu-type:      "CPU"
    spec:
      restartPolicy: Never
      serviceAccountName: gpu-service-be-account
      containers:
      - name: runner
        image: shadowcollect/ipynb-runner:latest
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "1"
            memory: "2Gi"
        env:
        - name: PRESIGNED_URL
          valueFrom:
            fieldRef:
              fieldPath: metadata.annotations['gpu-service-be.csie.ncu.edu.tw/presign-url']
        - name: CALLBACK_BASE_URL
          value: "http://gpu-service-be.gpu-service.svc.cluster.local:8080/api/v1/task/status"
        - name: INTERNAL_API_KEY
          valueFrom:
            secretKeyRef:
              name: internal-api-credentials
              key: api-key
        - name: SUBMISSION_ID
          valueFrom:
            fieldRef:
              fieldPath: metadata.annotations['gpu-service-be.csie.ncu.edu.tw/submission-id']
        - name: MINIO_ENDPOINT
          value: "http://minio.gpu-service.svc.cluster.local:9000"
        - name: MINIO_BUCKET
          value: "notebooks"
        - name: AWS_ACCESS_KEY_ID
          value: "admin"
        - name: AWS_SECRET_ACCESS_KEY
          value: "mhAH74T0Wo"
        - name: USER_ID
          valueFrom:
            fieldRef:
              fieldPath: metadata.annotations['gpu-service-be.csie.ncu.edu.tw/user-id']
        - name: TIMESTAMP
          valueFrom:
            fieldRef:
              fieldPath: metadata.annotations['gpu-service-be.csie.ncu.edu.tw/timestamp']
        - name: GPU_TYPE
          value: "CPU"
        command:
        - /bin/bash
        - -c
        - |
          set -euo pipefail
          # Create results directory
          RESULTS_DIR="/tmp/results"
          RESULT_PATH="s3://$MINIO_BUCKET/submissions/$USER_ID/${TIMESTAMP}_results"
          mkdir -p $RESULTS_DIR
          
          # Redirect all outputs to a log file
          exec > >(tee $RESULTS_DIR/execution.log) 2>&1
          
          # Function to save error log and exit
          save_error_and_exit() {
            rc=$?
            echo "Job failed with exit code $rc at $(date)"
            
            # Always save the error log to Minio
            cp $RESULTS_DIR/execution.log $RESULTS_DIR/error.log
            aws --endpoint-url=$MINIO_ENDPOINT s3 cp $RESULTS_DIR/error.log \
              $RESULT_PATH/error.log || echo "Failed to upload error log to Minio"
              
            # Try to copy any output notebook if it exists
            if [ -f output.ipynb ]; then
              aws --endpoint-url=$MINIO_ENDPOINT s3 cp output.ipynb \
                $RESULT_PATH/partial_result.ipynb || echo "Failed to upload partial result"
            fi
            
            # Optional backward compatibility callback
            if [ -n "${INTERNAL_API_KEY:-}" ]; then
              error_msg=$(sed -e ":a" -e "N;\$!ba" -e "s/\"/\\\\\"/g" -e "s/\n/\\\\n/g" $RESULTS_DIR/error.log | head -c 1000000)
              curl -X POST "$CALLBACK_BASE_URL/$SUBMISSION_ID/internal" \
                  -H "Content-Type: application/json" \
                  -H "X-API-Key: ${INTERNAL_API_KEY}" \
                  -d "{\"submissionId\":\"$SUBMISSION_ID\",\"status\":\"FAILED\",\"errorMessage\":\"$error_msg\"}" || true
            fi
            
            exit $rc
          }
          
          # Set up trap to save error logs on any failure
          trap 'save_error_and_exit' ERR EXIT
          
          echo "Starting job execution at $(date)"
          echo "Downloading input notebook..."
          curl -fSL "$PRESIGNED_URL" -o input.ipynb
          
          echo "Running papermill to execute notebook..."
          papermill input.ipynb output.ipynb \
            --no-progress-bar --log-output
          
          echo "Uploading execution results to MinIO..."
          # Copy both the output notebook and the log
          aws --endpoint-url=$MINIO_ENDPOINT s3 cp output.ipynb \
            $RESULT_PATH/result_notebook.ipynb
          aws --endpoint-url=$MINIO_ENDPOINT s3 cp $RESULTS_DIR/execution.log \
            $RESULT_PATH/execution.log
          
          # Optional backward compatibility callback
          if [ -n "${INTERNAL_API_KEY:-}" ]; then
            echo "Sending optional callback notification..."
            curl -X POST "$CALLBACK_BASE_URL/$SUBMISSION_ID/internal" \
                -H "Content-Type: application/json" \
                -H "X-API-Key: ${INTERNAL_API_KEY}" \
                -d "{\"submissionId\":\"$SUBMISSION_ID\",\"status\":\"COMPLETED\",\"resultPath\":\"$RESULT_PATH/result_notebook.ipynb\"}" || true
          fi
          
          echo "Job completed successfully at $(date)"
          # Reset trap before normal exit
          trap - ERR EXIT