apiVersion: scheduling.run.ai/v2
kind: Queue
metadata:
  name: gpu-queue-a100
spec:
  priority: 100              # higher than cpu‐queue
  resources:
    cpu:
      quota: 0
      overQuotaWeight: 0
    gpu:
      quota: 4              # fractional/MIG units
      overQuotaWeight: 1
    memory:
      quota: -1
      overQuotaWeight: 1