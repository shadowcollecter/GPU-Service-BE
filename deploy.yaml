# gpu-service-deployment.yaml
---
apiVersion: v1
kind: Namespace
metadata:
  name: gpu-service
---
# 後端服務的部署配置
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gpu-service-be
  namespace: gpu-service
  labels:
    app: gpu-service-be
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gpu-service-be
  template:
    metadata:
      labels:
        app: gpu-service-be
    spec:
      serviceAccountName: gpu-service-be-account
      containers:
      - name: gpu-service-be
        image: shadowcollect/gpu-service-be:latest  
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            cpu: "4000m"
            memory: "4Gi"
          limits:
            cpu: "6000m"
            memory: "6Gi"
        # 啟用健康檢查
        # livenessProbe:
        #   httpGet:
        #     path: /actuator/health/liveness
        #     port: 8080
        #   initialDelaySeconds: 60
        #   periodSeconds: 30
        #   failureThreshold: 3
        #   timeoutSeconds: 5
        # readinessProbe:
        #   httpGet:
        #     path: /actuator/health/readiness
        #     port: 8080
        #   initialDelaySeconds: 30
        #   periodSeconds: 20
        #   failureThreshold: 3
        #   timeoutSeconds: 3
        # # 添加存活檢查 - Startup Probe
        # startupProbe:
        #   httpGet:
        #     path: /actuator/health
        #     port: 8080
        #   failureThreshold: 30
        #   periodSeconds: 10
---
# 後端服務暴露 (僅供集群內部訪問)
apiVersion: v1
kind: Service
metadata:
  name: gpu-service-be
  namespace: gpu-service
spec:
  type: ClusterIP  # 僅供集群內部訪問
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: gpu-service-be
---
# 前端服務的部署配置
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gpu-service-fe
  namespace: gpu-service
  labels:
    app: gpu-service-fe
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gpu-service-fe
  template:
    metadata:
      labels:
        app: gpu-service-fe
    spec:
      containers:
      - name: gpu-service-fe
        image: shadowcollect/gpu-service-fe
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
        env:
        - name: API_URL
          value: "http://gpu-service-be.gpu-service.svc.cluster.local:8080"  # 使用完整的集群內部DNS名稱
        resources:
          requests:
            cpu: "1000m"
            memory: "1024Mi"
          limits:
            cpu: "1500m"
            memory: "2048Mi"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 20
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 3
---
# 前端服務暴露
apiVersion: v1
kind: Service
metadata:
  name: gpu-service-fe
  namespace: gpu-service
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
  selector:
    app: gpu-service-fe
---
# 服務帳號（用於Kubernetes API訪問）
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gpu-service-be-account
  namespace: gpu-service
---
# 必要的ClusterRole（與您的cluster-rule.yaml類似）
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: gpu-service-be-role
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get","list","watch","create","delete"]
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["get","list","watch","create","delete"]
- apiGroups: ["scheduling.run.ai"]
  resources: ["podgroups","queues","bindrequests","podgroups/status","bindrequests/status"]
  verbs: ["get","list","watch","patch"]
---
# ClusterRole綁定
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: gpu-service-be-binding
subjects:
- kind: ServiceAccount
  name: gpu-service-be-account
  namespace: gpu-service
roleRef:
  kind: ClusterRole
  name: gpu-service-be-role
  apiGroup: rbac.authorization.k8s.io
---
# 任務配置信息
apiVersion: v1
kind: ConfigMap
metadata:
  name: job-config
  namespace: gpu-service
data:
  CALLBACK_BASE_URL: "http://gpu-service-be.gpu-service.svc.cluster.local:8080/api/v1/task/status"
  MINIO_ENDPOINT: "http://minio.gpu-service.svc.cluster.local:9000"
  MINIO_BUCKET: "notebooks"
---
# Ingress 配置 (僅曝露前端)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gpu-service-ingress
  namespace: gpu-service
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - jupyterhub.csie.ncu.edu.tw
    secretName: jupyterhub-csie-ncu-tls
  rules:
  - host: jupyterhub.csie.ncu.edu.tw
    http:
      paths:
      # 新增这段，用于对外 /api 请求转发到 GPU Service 后端
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: gpu-service-be
            port:
              number: 8080

      # 原本的前端静态资源转发
      - path: /
        pathType: Prefix
        backend:
          service:
            name: gpu-service-fe
            port:
              number: 80