# Error handling in production
server.error.include-exception=false
server.error.include-message=never
server.error.include-stacktrace=never

# Actuator production settings
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# K8s job monitoring configuration
k8s.job.monitor.interval-ms=10000
k8s.job.concurrent-limit.cpu=${K8S_JOB_CONCURRENT_LIMIT_CPU:2}
k8s.job.concurrent-limit.gpu-a100=${K8S_JOB_CONCURRENT_LIMIT_GPU_A100:1}
k8s.job.concurrent-limit.gpu-a40=${K8S_JOB_CONCURRENT_LIMIT_GPU_A40:2}
k8s.job.clean.completed-jobs-ttl-seconds=3600
k8s.job.clean.failed-jobs=true

# LLM Scanner Rate Limiter Configuration
llm.rate-limit.requests-per-minute=${LLM_RATE_LIMIT_REQUESTS_PER_MINUTE:20}
llm.rate-limit.burst-capacity=${LLM_RATE_LIMIT_BURST_CAPACITY:30}
llm.scanner.poll-interval-ms=${LLM_SCANNER_POLL_INTERVAL_MS:500}

# Job templates directory
job.template.dir=/app/customize-yaml

# Task submission mode - queue mode uses Redis
task.submit.mode=queue

# Unified queue configuration
queue.names=cpu-queue,gpu-queue-a100,gpu-queue-a40
# Redis list key mapping
queue.redisKeys.cpu-queue=task_queue_cpu
queue.redisKeys.gpu-queue-a100=task_queue_a100
queue.redisKeys.gpu-queue-a40=task_queue_a40

# GPU config for mapping types, templates and queues
gpu.cpu.yaml=cpu-requested-job.yaml
gpu.cpu.queue=cpu-queue
gpu.types[0].type=NVIDIA-A100-80GB-PCIe
gpu.types[0].yaml=gpu-requested-job-a100.yaml
gpu.types[0].queue=gpu-queue-a100
gpu.types[1].type=NVIDIA-A40-48GB-PCIe
gpu.types[1].yaml=gpu-requested-job-a40.yaml
gpu.types[1].queue=gpu-queue-a40

# Default remaining time (seconds) assigned to each user
usage.default-remaining-time-sec=360000