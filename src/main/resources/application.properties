spring.application.name=gpu-service-BE

# default profile
spring.profiles.active=dev
spring.jpa.defer-datasource-initialization=true

# job templates for K8s submission
job.template.cpu=customize-yaml/cpu-requested-job.yaml
job.template.gpu-a100=customize-yaml/gpu-requested-job-a100.yaml
job.template.gpu-a40=customize-yaml/gpu-requested-job-a40.yaml

# GPU-specific job templates
job.template.gpu.NVIDIA-A100-80GB-PCIe=gpu-requested-job-a100.yaml
job.template.gpu.NVIDIA-A40-48G-PCIE=gpu-requested-job-a40.yaml

# GPU config for mapping types, templates and queues
gpu.cpu.yaml=cpu-requested-job.yaml
gpu.cpu.queue=cpu-queue
gpu.types[0].type=NVIDIA-A100-80GB-PCIe
gpu.types[0].yaml=gpu-requested-job-a100.yaml
gpu.types[0].queue=gpu-queue-a100
gpu.types[1].type=NVIDIA-A40-48GB-PCIe
gpu.types[1].yaml=gpu-requested-job-a40.yaml
gpu.types[1].queue=gpu-queue-a40

# GPU selection thresholds and queue names
job.gpu.threshold.a100=79.0

# Unified queue configuration
queue.names=cpu-queue,gpu-queue-a100,gpu-queue-a40
# Redis list key mapping
queue.redisKeys.cpu-queue=task_queue_cpu
queue.redisKeys.gpu-queue-a100=task_queue_a100
queue.redisKeys.gpu-queue-a40=task_queue_a40

# Kubernetes namespace for job submission and watcher
kubernetes.namespace=gpu-service

# LLM Scanner Rate Limiter Configuration
llm.rate-limit.requests-per-minute=20
llm.rate-limit.burst-capacity=30
llm.scanner.poll-interval-ms=500

# Task submission mode (queue or direct)
task.submit.mode=queue

# InternalQueueScheduler configuration
internal.scheduler.poll-interval-ms=10000
internal.scheduler.pending-count=2
internal.scheduler.running-count=1

# Default remaining time (seconds) assigned to each user upon login or reset
usage.default-remaining-time-sec=360000
# 100 hours default remaining time


spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

spring.sql.init.mode=always


# Expose error details in HTTP responses
server.error.include-exception=true
server.error.include-message=always
server.error.include-stacktrace=always
server.error.include-binding-errors=always