apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: binder.run.ai
  labels:
    app: binder
spec:
  webhooks:
  - name: binder.run.ai
    admissionReviewVersions: ["v1", "v1beta1"]
    clientConfig:
      service:
        name: binder
        namespace: kai-scheduler
        path: "/mutate--v1-pod"
      caBundle: ${CA_BUNDLE}  # 此處需要填入證書內容，稍後提供命令
    rules:
    - apiGroups: [""]
      apiVersions: ["v1"]
      operations: ["CREATE"]
      resources: ["pods"]
      scope: "*"
    sideEffects: None
    timeoutSeconds: 30
    failurePolicy: Ignore  # 改為Ignore避免阻塞所有Pod創建
    namespaceSelector:
      matchExpressions:
      - key: kubernetes.io/metadata.name
        operator: In
        values: 
        - kai-scheduler     # 只包含kai-scheduler命名空間
        - default           # 以及default命名空間
      - key: kubernetes.io/metadata.name
        operator: NotIn
        values: 
        - gpu-service       # 明確排除gpu-service命名空間
        - kube-system       # 排除系統命名空間